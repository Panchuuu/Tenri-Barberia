name: Deploy — Producción

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Deploy a servidor vía SSH
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASS }}
          port:     ${{ secrets.SSH_PORT }}
          script: |
            set -e
            # Clonar/actualizar el repo en carpeta segura (fuera del webroot)
            mkdir -p ~/apps/booking-tenri
            cd ~/apps/booking-tenri
            if [ ! -d ".git" ]; then
              git clone https://github.com/Panchuuu/Tenri-Barberia.git .
            else
              git pull origin main
            fi

            # Deploy del backend Laravel
            cd ~/apps/booking-tenri/Tenri-Backend/backend
            composer install --no-dev --optimize-autoloader
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            echo "✅ Deploy completado en $(date)"
