name: CI/CD — Tenri Booking

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ══════════════════════════════════════════════
  # JOB 1 — TESTS BACKEND PHP
  # ══════════════════════════════════════════════
  test-backend:
    name: 🧪 Tests Backend (PHP)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Tenri-Backend/backend

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: pdo, pdo_sqlite, sqlite3, mbstring, bcmath, tokenizer, xml, ctype, json
          coverage: none

      - name: 📦 Instalar dependencias
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: 🔧 Preparar .env para testing
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: 🧪 Correr tests
        run: php artisan test --testsuite=Feature --stop-on-failure

  # ══════════════════════════════════════════════
  # JOB 2 — TESTS FRONTEND (lint + build)
  # ══════════════════════════════════════════════
  test-frontend:
    name: 🧪 Tests Frontend (lint + build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Tenri-Front/frontend

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 📦 Instalar pnpm
        run: npm install -g pnpm

      - name: 📦 Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: 🔍 Lint
        run: pnpm lint

      - name: 🏗️ Build
        env:
          VITE_API_URL: https://booking.tenri.cl/api
        run: pnpm build

  # ══════════════════════════════════════════════
  # JOB 3 — DEPLOY (solo main + ambos tests OK)
  # ══════════════════════════════════════════════
  deploy:
    name: 🚀 Deploy a producción
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # ── Frontend: build ──────────────────────
      - name: ⚙️ Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 📦 Instalar pnpm
        run: npm install -g pnpm

      - name: 📦 Instalar dependencias frontend
        working-directory: Tenri-Front/frontend
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build frontend
        working-directory: Tenri-Front/frontend
        env:
          VITE_API_URL: https://booking.tenri.cl/api
        run: pnpm build

      # ── Notificar al servidor via webhook ─────
      - name: 🚀 Trigger deploy webhook
        run: |
          echo "Enviando webhook a booking.tenri.cl..."
          RESPONSE=$(curl -s -o /tmp/deploy_response.txt -w "%{http_code}" \
            -X POST \
            -H "X-Deploy-Secret: ${{ secrets.DEPLOY_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{"ref":"refs/heads/main"}' \
            https://booking.tenri.cl/deploy.php)

          echo "HTTP Status: $RESPONSE"
          echo "Response body:"
          cat /tmp/deploy_response.txt

          if [ "$RESPONSE" != "200" ]; then
            echo "❌ Deploy webhook falló con status $RESPONSE"
            exit 1
          fi

          echo "✅ Deploy completado exitosamente"
