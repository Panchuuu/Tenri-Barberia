name: CI/CD — Tenri Booking

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ══════════════════════════════════════════════
  # JOB 1 — TESTS BACKEND PHP
  # ══════════════════════════════════════════════
  test-backend:
    name: 🧪 Tests Backend (PHP)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Tenri-Backend/backend

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: pdo, pdo_sqlite, sqlite3, mbstring, bcmath, tokenizer, xml, ctype, json
          coverage: none

      - name: 📦 Instalar dependencias
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: 🔧 Preparar .env para testing
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: 🧪 Correr tests
        run: php artisan test --testsuite=Feature --stop-on-failure

  # ══════════════════════════════════════════════
  # JOB 2 — TESTS FRONTEND (lint + build)
  # ══════════════════════════════════════════════
  test-frontend:
    name: 🧪 Tests Frontend (lint + build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Tenri-Front/frontend

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 📦 Instalar dependencias
        run: |
          npm install -g pnpm
          pnpm install --frozen-lockfile

      - name: 🔍 Lint
        run: pnpm lint

      - name: 🏗️ Build
        env:
          VITE_API_URL: https://booking.tenri.cl/api
        run: pnpm build

  # ══════════════════════════════════════════════
  # JOB 3 — DEPLOY (solo main + ambos tests OK)
  # ══════════════════════════════════════════════
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # ── Frontend ──────────────────────────────
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 📦 Instalar dependencias frontend
        run: |
          cd Tenri-Front/frontend
          npm install -g pnpm
          pnpm install --frozen-lockfile

      - name: 🏗️ Build frontend
        env:
          VITE_API_URL: https://booking.tenri.cl/api
        run: |
          cd Tenri-Front/frontend
          pnpm build

      - name: 🚀 Subir frontend a public_html (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: Tenri-Front/frontend/dist/
          server-dir: ./

      # ── Backend ───────────────────────────────
      - name: ⚙️ Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, pdo_mysql, zip, bcmath, tokenizer, xml, ctype, json

      - name: 📦 Instalar dependencias backend
        run: |
          cd Tenri-Backend/backend
          composer install --optimize-autoloader --no-dev --no-interaction

      - name: 🗜️ Comprimir backend
        run: |
          mkdir -p _deploy
          cd Tenri-Backend/backend
          zip -r ../../_deploy/backend.zip . \
            -x "*.git*" \
            -x "tests/*" \
            -x "node_modules/*" \
            -x ".env*" \
            -x "storage/logs/*" \
            -x "storage/framework/cache/*" \
            -x "storage/framework/sessions/*" \
            -x "storage/framework/views/*"

      - name: 🚀 Subir backend comprimido (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME_ROOT }}
          password: ${{ secrets.FTP_PASSWORD_ROOT }}
          local-dir: ./_deploy/
          server-dir: booking_backend/

      # ── Notificar deploy completado ───────────
      - name: ✅ Deploy de archivos completado
        run: |
          echo "✅ Frontend y backend subidos via FTP"
          echo "⚠️ Ejecuta los comandos artisan en el servidor:"
          echo "   cd ~/booking_backend"
          echo "   unzip -o backend.zip && rm backend.zip"
          echo "   cd Tenri-Backend/backend"
          echo "   php artisan migrate --force && php artisan optimize:clear"
